<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dierk Thomas - Case History Archive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: #2c3e50; color: white; padding: 30px; text-align: center; border-radius: 8px; margin-bottom: 30px; }
        h1 { margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; font-size: 16px; border: 1px solid #ddd; }
        .document-list { background: white; padding: 20px; border-radius: 8px; }
        .document { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .document:hover { background: #f9f9f9; }
        .doc-info h3 { margin-bottom: 5px; color: #2c3e50; }
        .doc-date { font-size: 0.9em; color: #666; }
        .doc-actions { display: flex; gap: 10px; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .view-btn { background: #27ae60; color: white; }
        .view-btn:hover { background: #229954; }
        .download-btn { background: #3498db; color: white; }
        .download-btn:hover { background: #2980b9; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Dierk Thomas - Case History Archive</h1>
            <p>Complete Document Collection (2007-2017)</p>
        </header>

        <input type="text" id="search" placeholder="Search documents..." onkeyup="filterDocs()">

        <div class="document-list" id="docList"></div>
    </div>

    <script>
        // Array of PDF files with exact filenames from your repository

            { name: "German Criminal Judgment (2)", date: "2013-10-18", file: "20131018 German Criminal Judgment Dierk Thomas 2.pdf" },
            { name: "Urteil Steuerhinterziehung", date: "2013-10-28", file: "20131028 Dierk Thomas Urteil im Steuerhinterziehungsverfahren (1).pdf" },

            { name: "Kriminalpolizei Wien Report (2)", date: "2014-09-08", file: "20140908 Kriminalpolizei Wien Dierk Thomas Gfoeller Pachtvertrag Untersuchungsbericht 2.pdf" },
            { name: "Kriminalpolizei Wien Report (3)", date: "2014-09-08", file: "20140908 Kriminalpolizei Wien Dierk Thomas Gfoeller Pachtvertrag Untersuchungsbericht.pdf" },
            { name: "Landesgericht Innsbruck Judgment", date: "2015-07-31", file: "20150731 Urteil Landesgericht Innsbruck Richter Boehner Dierk Thomas _cid___JustizArchivRef-40001_ (1).pdf" },
            { name: "Austrian Criminal Judgment (English 1)", date: "2016-08-04", file: "20160804 Austrian Criminal Judgment Dierk Thomas English Translation Fir... (1).pdf" },
            { name: "Austrian Criminal Judgment (English 2)", date: "2016-08-04", file: "20160804 Austrian Criminal Judgment Dierk Thomas English Translation Fir... 2.pdf" },
            { name: "Austrian Criminal Judgment (German)", date: "2016-08-04", file: "20160804 Austrian Criminal Judgment Dierk Thomas German_ (1).pdf" },
            { name: "Michaela Thomas Witness Statement", date: "2016-12-14", file: "20161214 1st Witness Statement of Michaela Thomas 415 of 2015 14DEC2016.pdf" },
            { name: "Kathryn Jackson Witness Statement", date: "2016-12-14", file: "20161214 Kathryn Jackson Witness Statement 415 of 2015 Dierk Thomas.pdf" },
            { name: "M W Peachman Witness Statement", date: "2016-12-14", file: "20161214 MWPeachman Witness Statement - 4763 of 2005.pdf" },
            { name: "Mr Justice Snowden Freezing Injunction (2)", date: "2016-12-20", file: "20161220 Mr Justice Snowden Freezing Injunction Dierk Thomas 4763 of 2005 vantage_point_21_dec_16 (2).pdf" },
            { name: "Mr Justice Snowden Freezing Injunction (3)", date: "2016-12-20", file: "20161220 Mr Justice Snowden Freezing Injunction Dierk Thomas 4763 of 2005 vantage_point_21_dec_16 (3).pdf" },
            { name: "Mr Justice Snowden Freezing Injunction (Main)", date: "2016-12-20", file: "20161220 Mr Justice Snowden Freezing Injunction Dierk Thomas 4763 of 2005 vantage_point_21_dec_16 2.pdf" },

            { name: "Amended Statement - Thomas Haederle", date: "2017-06-07", file: "20170607 Amended SA Thomas Haederle.pdf" },
            { name: "Case Summary (2)", date: "2017-06-07", file: "20170607 Case Summary2 (2).pdf" },
            { name: "Case Summary (2nd version)", date: "2017-06-07", file: "20170607 Case Summary2 2.pdf" },

            { name: "Bankruptcy Judgment - Dismissed", date: "2017-10-20", file: "20171020 Registrar Derrett Judgment Bankruptcy Dierk Thomas dismissed.pdf" },
            { name: "Scan Document", date: "2015-06-26", file: "Scan_20150626_083048.pdf" },
            { name: "Schreiben Haederle", date: "Unknown", file: "Schreiben HÃ¤derle 1.pdf" },
            { name: "Terminsbericht Verhandlung (1)", date: "Unknown", file: "Terminsbericht Verhandlung gg. Michaela Thomas (1).pdf" },
            { name: "Terminsbericht Verhandlung (2)", date: "Unknown", file: "Terminsbericht Verhandlung gg. Michaela Thomas 2.pdf" },
            { name: "Stellungnahme (Position Statement)", date: "Unknown", file: "stellungnahme (1).pdf" }
        ];

        function renderDocs() {
            const list = document.getElementById('docList');
            list.innerHTML = '';
            docs.forEach(doc => {
                const encodedFile = encodeURIComponent(doc.file);
                const pdfUrl = `https://cdn.jsdelivr.net/gh/ursflux/DierkThomas@main/pdfs/${encodedFile}`;
                const div = document.createElement('div');
                div.className = 'document';
                div.innerHTML = `
                    <div class="doc-info">
                        <h3>${doc.name}</h3>
                        <p class="doc-date">📅 ${doc.date}</p>
                    </div>
                    <div class="doc-actions">
                        <a href="${pdfUrl}" target="_blank" class="view-btn">📖 View</a>
                        <a href="${pdfUrl}" download class="download-btn">⬇ Download</a>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function filterDocs() {
            const search = document.getElementById('search').value.toLowerCase();
            const documents = document.querySelectorAll('.document');
            documents.forEach(doc => {
                const text = doc.textContent.toLowerCase();
                doc.style.display = text.includes(search) ? '' : 'none';
            });
        }

        renderDocs();
    </script>
</body>
</html>
